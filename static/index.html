<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Policy Debate Simulator</title>
    <meta name="description" content="AI-powered simulation of climate policy debates between USA, EU, and China.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --accent-usa: #3b82f6;
            --accent-eu: #f59e0b;
            --accent-china: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        h1, h2 {
            font-family: 'Outfit', sans-serif;
            margin-bottom: 1rem;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 0.8s ease-out;
        }

        .header h1 {
            font-size: 3rem;
            background: linear-gradient(to right, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .setup-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 0.5rem;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .transcript {
            margin-top: 3rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1rem;
            border-left: 5px solid transparent;
            animation: slideIn 0.5s ease-out forwards;
            opacity: 0;
            position: relative;
        }

        .message-card.usa { border-left-color: var(--accent-usa); }
        .message-card.eu { border-left-color: var(--accent-eu); }
        .message-card.china { border-left-color: var(--accent-china); }

        .agent-name {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stance-badge {
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            text-transform: uppercase;
            font-weight: 800;
        }

        .stance-supportive { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .stance-opposed { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .stance-neutral { background: rgba(148, 163, 184, 0.2); color: #cbd5e1; }

        .meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .loading-spinner {
            display: none;
            margin: 2rem auto;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Climate Simulator</h1>
            <p>High-stakes multi-agent AI debate on global climate policy</p>
        </header>

        <main>
            <div class="setup-card" id="setupForm">
                <div class="form-group">
                    <label for="topic">Debate Topic</label>
                    <input type="text" id="topic" placeholder="e.g. Carbon tax implementation or Renewable energy transition" value="Implementation of a global carbon tax">
                </div>
                <div class="form-group">
                    <label for="rounds">Number of Rounds (1-5)</label>
                    <input type="number" id="rounds" min="1" max="5" value="2">
                </div>
                <button id="startBtn">Initiate Simulation</button>
            </div>

            <div class="loading-spinner" id="spinner"></div>

            <div class="transcript" id="transcript"></div>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 Climate Policy Debate Simulator | Built with FastAPI & Ollama</p>
    </footer>

    <script src="/static/script.js"></script>
</body>
</html>
